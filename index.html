            const [categories, setCategories] = useState(['Makanan', 'Minuman', 'Snack']);

            // Data Pesanan Online

            const [onlineOrders, setOnlineOrders] = useState([
                { id: 101, source: 'Website Usaha', status: 'Baru', customerName: 'Ahmad S.', items: '2x Kopi Susu Gula Aren', total: 30000, time: '10:30' },

            // Form States
            const [newProduct, setNewProduct] = useState({ name: '', price: '', brand: '', category: '', image: null, isFavorite: false, hasModalPrice: false, isStockActive: false });
            const [editingProductId, setEditingProductId] = useState(null);
            
            const [newEmployee, setNewEmployee] = useState({ name: '', phone: '', job: '', email: '', pin: '', access: 'Operator' });

            const [recipeTab, setRecipeTab] = useState('bahan');

            const [deleteTarget, setDeleteTarget] = useState({ type: null, id: null });

            const [newPlatformInput, setNewPlatformInput] = useState('');

            // --- BAHASA / i18n ---
            const i18n = {

                en: { welcome: "Welcome", welcome_desc: "Complete profile to start.", name_placeholder: "Full Name", start_app: "Get Started", home: "Home", manage_prod: "Manage Products", employee: "Employee", outlet: "Outlet", wallet: "Wallet Balance", help: "Help", report: "Reports", trans: "Transaction", history: "History", customer: "Customers", inventory: "Inventory", settings: "Settings", dark_mode: "Dark Mode", lang: "Language", save: "Save", cancel: "Cancel", add: "Add", edit: "Edit", delete: "Delete", income: "Income", expense: "Expense", profit: "Net Profit", total: "Total Price", pay: "Pay", products: "Products", stock: "Stock", recipe: "Recipe", ingredients: "Ingredients", appearance: "Appearance", online_orders: "Online Orders" }
            };
            const t = (key) => i18n[lang][key] || key;
// --- TEMA ---
            const isDark = theme === 'dark';
            const bgClass = isDark ? 'bg-slate-950' : 'bg-gray-50';
            const cardClass = isDark ? 'bg-slate-900 border-slate-800' : 'bg-white border-gray-100';
            const textClass = isDark ? 'text-gray-100' : 'text-gray-800';
            const subTextClass = isDark ? 'text-gray-400' : 'text-gray-500';
            const inputClass = isDark ? 'bg-slate-800 border-slate-700 text-white placeholder-slate-500' : 'bg-white border-gray-200 text-gray-800';

            const navigate = (page) => { 
                setCurrentPage(page); 
                localStorage.setItem('app_currentPage', page);
                setIsSidebarOpen(false); 
                window.scrollTo(0, 0); 
            };

            const handleLogin = () => {
                if (userProfile.name) {
                    localStorage.setItem('app_userProfile', JSON.stringify(userProfile));
                    navigate('home');
                }
            };

            const handleLogout = () => {
                localStorage.removeItem('app_userProfile');
                localStorage.removeItem('app_currentPage');
                setUserProfile({ name: '', photo: null, role: 'Pemilik' });
                navigate('onboarding');
            };

            // --- LOGIKA TRANSAKSI OFFLINE & ONLINE ---
            const handleProcessTransaction = () => {
                if(!txProductId) return;
                const product = products.find(p => p.id === parseInt(txProductId));
                const total = product.price * txQty;
                const time = new Date().toLocaleString(lang === 'id' ? 'id-ID' : 'en-US', { hour: '2-digit', minute:'2-digit', day: '2-digit', month: 'short' });
                
                setProducts(products.map(p => p.id === product.id ? { ...p, stock: Math.max(0, p.stock - txQty) } : p));
                if(product.recipe && product.recipe.length > 0) {
                setIngredients(ingredients.map(ing => {
                    const recipeItem = product.recipe.find(r => r.ingredientId === ing.id);
                    return recipeItem ? { ...ing, stock: Math.max(0, ing.stock - (recipeItem.amount * txQty)) } : ing;
                }));
                }

                if (txType === 'Offline') {
                setTransactionHistory([{ id: Date.now(), productName: product.name, qty: txQty, total, time }, ...transactionHistory]);
                setSalesData({ today: salesData.today + total, month: salesData.month + total });
                setWalletBalance(prev => prev + total);
                setWalletTransactions(prev => [{ id: Date.now(), type: 'PENJUALAN', amount: total, date: time, desc: `Offline - ${product.name}` }, ...prev]);
                } else {
                const formattedTime = new Date().toLocaleTimeString(lang === 'id' ? 'id-ID' : 'en-US', { hour: '2-digit', minute: '2-digit' });
                const newOrder = { id: Date.now(), source: txSource, status: 'Baru', customerName: txCustomerName || 'Pelanggan', items: `${txQty}x ${product.name}`, total: total, time: formattedTime };
                setOnlineOrders([newOrder, ...onlineOrders]);
                }

                setShowTxModal(false); setTxProductId(''); setTxQty(1); setTxType('Offline'); setTxCustomerName('');
            };

                let nextStatus = '';
                if(order.status === 'Baru') nextStatus = 'Diproses';

                                if(showAddBrandModal && newBrandInput.trim()){ setBrands([...brands, newBrandInput]); setNewProduct({...newProduct, brand: newBrandInput}); setShowAddBrandModal(false); setNewBrandInput(''); } 
                                if(showAddCategoryModal && newCategoryInput.trim()){ setCategories([...categories, newCategoryInput]); setNewProduct({...newProduct, category: newCategoryInput}); setShowAddCategoryModal(false); setNewCategoryInput(''); } 
                                if(showAddPlatformModal && newPlatformInput.trim()){ setOnlinePlatforms([...onlinePlatforms, newPlatformInput.trim()]); setShowAddPlatformModal(false); setNewPlatformInput(''); }
                            }} className="flex-1 py-3.5 bg-red-500 text-white font-black rounded-xl shadow-lg shadow-red-500/30 active:scale-95 transition-transform">{t('save')}</button>
                        </div>
                        </div>
                    </div>
                    )}

                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
